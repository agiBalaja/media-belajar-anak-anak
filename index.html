<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- 3. Mobile Responsif: Meta tag viewport wajib untuk perangkat seluler -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda Bermain & Belajar</title>
    
    <!-- Menggunakan font Google 'Nunito' yang membulat dan ramah anak -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

    <!-- Menghubungkan file manifest PWA -->
    <link rel="manifest" href="manifest.json">
    <!-- Menentukan warna tema status bar di HP -->
    <meta name="theme-color" content="#FF6B6B">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    
    <style>
        /* 2. Warna yang nyaman di mata (Soft Pastel / Candy Colors) */
        :root {
            --bg-color: #F0F8FF; /* Alice Blue yang lembut */
            --text-color: #4A4A4A; /* Abu-abu gelap agar tidak terlalu kontras seperti hitam */
            --card-1: #FFB3BA; /* Pastel Pink */
            --card-2: #FFDFBA; /* Pastel Orange */
            --card-3: #FFFFBA; /* Pastel Yellow */
            --card-4: #BAFFC9; /* Pastel Green */
            --card-5: #BAE1FF; /* Pastel Blue */
            --card-6: #E8BAFF; /* Pastel Purple */
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            text-align: center;
            padding: 20px;
            margin: 0;
            background-image: radial-gradient(#bae1ff 10%, transparent 11%), radial-gradient(#bae1ff 10%, transparent 11%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px; /* Motif polkadot samar */
        }

        /* 4. Tambahkan Animasi: Animasi mengambang (floating) pada judul */
        h1 {
            font-size: 2.5rem;
            color: #FF6B6B;
            text-shadow: 2px 2px 0px #FFF, 4px 4px 0px rgba(0,0,0,0.1);
            animation: float 3s ease-in-out infinite;
            margin-bottom: 5px;
        }

        p {
            font-size: 1.2rem;
            font-weight: 700;
            color: #555;
            margin-bottom: 30px;
        }

        /* 3. Mobile Responsif: Menggunakan CSS Grid agar tombol otomatis menyesuaikan layar */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
            padding: 10px;
        }

        /* 1. Desain Semangat Belajar: Tampilan tombol seperti kartu (Flashcards) */
        .nav-grid a {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border-radius: 20px;
            text-decoration: none;
            color: #333;
            font-weight: 800;
            font-size: 1.2rem;
            box-shadow: 0 6px 0px rgba(0,0,0,0.1); /* Efek tombol 3D */
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 3px solid rgba(255,255,255,0.5);
        }

        /* Mewarnai kartu secara berurutan dengan warna pastel */
        .nav-grid a:nth-child(6n+1) { background-color: var(--card-1); }
        .nav-grid a:nth-child(6n+2) { background-color: var(--card-2); }
        .nav-grid a:nth-child(6n+3) { background-color: var(--card-3); }
        .nav-grid a:nth-child(6n+4) { background-color: var(--card-4); }
        .nav-grid a:nth-child(6n+5) { background-color: var(--card-5); }
        .nav-grid a:nth-child(6n+6) { background-color: var(--card-6); }

        /* 4. Tambahkan Animasi: Efek tombol tertekan (bouncy) saat dihover */
        .nav-grid a:hover {
            transform: translateY(4px);
            box-shadow: 0 2px 0px rgba(0,0,0,0.1);
        }

        /* Keyframes untuk animasi judul mengambang */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
    </style>
</head>
<body>
    <h1>🌟 Taman Belajar Ceria 🌟</h1>
    <p>Ayo pilih permainanmu hari ini!</p>
    
    <nav class="nav-grid">
        <!-- Menambahkan Emoji sebagai visual aid (bantuan visual) untuk anak -->
        <a href="BELAJAR HURUF HIJAIYAH Tebak Huruf Hijaiyah/">🕌 Tebak Hijaiyah</a>
        <a href="Belajar Mengeja dan Membaca/">📖 Mengeja & Membaca</a>
        <a href="Fotografer Profesional/">📸 Fotografer</a>
        <a href="Game Tebak Huruf Anak (Responsif)/">🔠 Tebak Huruf</a>
        <a href="Game Tebak Huruf Ceria - Animasi Latar Belakang/">✨ Huruf Ceria</a>
        <a href="Game Tebak Warna Anak/">🎨 Tebak Warna</a>
        <a href="Iqro' 1 - Huruf Hijaiyah/">🕋 Iqro' 1</a>
        <a href="Kalkulator pintar (Bersuara)/">🧮 Kalkulator Pintar</a>
        <a href="Whiteboard/">🖍️ Papan Tulis (Whiteboard)</a>
    </nav>

    <!-- Script untuk mendaftarkan Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('ServiceWorker sukses didaftarkan dengan scope: ', registration.scope);
                    })
                    .catch(error => {
                        console.log('Pendaftaran ServiceWorker gagal: ', error);
                    });
            });
        }
    </script>
</body>
</html>
</body>
</html>
