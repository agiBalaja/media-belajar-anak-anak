<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Tebak Warna Anak (Responsif)</title>
  <style>
    :root {
      --bg: #e0f2fe;
      --card-bg: #ffffff;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --accent: #f97316;
      --success: #16a34a;
      --danger: #dc2626;
      --text-main: #0f172a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #bfdbfe, var(--bg));
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .game-wrapper {
      width: 100%;
      max-width: 900px;
    }

    .game-card {
      background: var(--card-bg);
      border-radius: 18px;
      box-shadow: 0 15px 30px rgba(15, 23, 42, 0.18);
      padding: 18px 16px 20px;
      border: 1px solid rgba(148, 163, 184, 0.4);
    }

    @media (min-width: 600px) {
      .game-card {
        padding: 24px 24px 26px;
      }
    }

    .game-header {
      text-align: center;
      margin-bottom: 14px;
    }

    .title-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(37, 99, 235, 0.08);
      color: var(--primary);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .title-chip span {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.25);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 4px;
      color: var(--primary-dark);
    }

    @media (min-width: 600px) {
      h1 {
        font-size: 24px;
      }
    }

    .subtitle {
      font-size: 13px;
      color: #64748b;
    }

    #question {
      font-size: 15px;
      margin: 14px 0 10px;
      text-align: center;
    }

    #colorName {
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
    }

    .info-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 13px;
      color: #475569;
    }

    .info-pill {
      padding: 4px 10px;
      border-radius: 999px;
      background: #eff6ff;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .info-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #22c55e;
    }

    #boxes {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .box {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      cursor: pointer;
      border: 3px solid #ffffff;
      box-shadow: 0 6px 12px rgba(15, 23, 42, 0.18);
      transition: transform 0.1s, box-shadow 0.1s, border-color 0.1s;
    }

    @media (min-width: 480px) {
      .box {
        width: 70px;
        height: 70px;
      }
    }

    @media (min-width: 768px) {
      .box {
        width: 76px;
        height: 76px;
      }
    }

    .box:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 10px 18px rgba(15, 23, 42, 0.25);
      border-color: rgba(15, 23, 42, 0.18);
    }

    #message {
      font-size: 14px;
      min-height: 22px;
      margin-bottom: 6px;
      text-align: center;
      font-weight: 500;
    }

    #score {
      font-size: 14px;
      margin-bottom: 10px;
      text-align: center;
      color: #0f766e;
      font-weight: 600;
    }

    .button-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 4px;
    }

    button {
      padding: 8px 14px;
      font-size: 14px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 0.03em;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.1s, box-shadow 0.1s, background 0.1s;
      min-width: 140px;
    }

    #btnRepeat {
      background: #e0f2fe;
      color: var(--primary-dark);
      box-shadow: 0 6px 12px rgba(148, 163, 184, 0.5);
    }

    #btnNext {
      background: var(--primary);
      color: #ffffff;
      box-shadow: 0 6px 14px rgba(37, 99, 235, 0.55);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 16px rgba(15, 23, 42, 0.25);
    }

    #btnNext:hover {
      background: var(--primary-dark);
    }

    .btn-icon {
      font-size: 15px;
    }

    .footer-note {
      margin-top: 8px;
      font-size: 11px;
      text-align: center;
      color: #9ca3af;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 18px;
      }
      #question {
        font-size: 14px;
      }
      button {
        font-size: 13px;
        padding: 7px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="game-card">
      <div class="game-header">
        <div class="title-chip">
          <span></span>
          GAME EDUKASI WARNA
        </div>
        <h1>Tebak Warna Ceria</h1>
        <p class="subtitle">Dengar suaranya, pilih warna yang benar!</p>
      </div>

      <p id="question">
        Zhafran, yang mana kotak warna: <span id="colorName">MERAH</span>
      </p>

      <div class="info-row">
        <div class="info-pill">
          <div class="info-dot"></div>
          Latihan mengenal warna
        </div>
        <div class="info-pill">
          🎧 Audio panduan
        </div>
      </div>

      <div id="boxes">
        <!-- kotak warna akan dibuat dengan JavaScript -->
      </div>

      <div id="message"></div>
      <div id="score">Skor: 0</div>

      <div class="button-row">
        <button id="btnRepeat">
          <span class="btn-icon">🔊</span> Ulangi Suara
        </button>
        <button id="btnNext">
          <span class="btn-icon">➡️</span> Soal Berikutnya
        </button>
      </div>

      <div class="footer-note">
        Tip: Lebih seru dimainkan dengan suara aktif di browser.
      </div>
    </div>
  </div>

  <script>
    // Cek dukungan Speech Synthesis
    const synth = window.speechSynthesis;

    function speak(text) {
      if (!synth) return;
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "id-ID";
      synth.cancel();
      synth.speak(utter);
    }

    // Daftar warna lebih banyak
    const colors = [
      { name: "MERAH",       code: "#ef4444" },
      { name: "BIRU",        code: "#3b82f6" },
      { name: "HIJAU",       code: "#22c55e" },
      { name: "KUNING",      code: "#eab308" },
      { name: "UNGU",        code: "#8b5cf6" },
      { name: "ORANYE",      code: "#f97316" },
      { name: "PINK",        code: "#ec4899" },
      { name: "COKLAT",      code: "#8b5a2b" },
      { name: "ABU-ABU",     code: "#9ca3af" },
      { name: "HITAM",       code: "#020617" },
      { name: "PUTIH",       code: "#ffffff" },
      { name: "BIRU MUDA",   code: "#7dd3fc" },
      { name: "HIJAU MUDA",  code: "#bbf7d0" },
      { name: "KUNING MUDA", code: "#fef9c3" },
      { name: "MERAH MUDA",  code: "#fecaca" }
    ];

    const boxesContainer = document.getElementById("boxes");
    const colorNameText  = document.getElementById("colorName");
    const message        = document.getElementById("message");
    const scoreText      = document.getElementById("score");
    const btnNext        = document.getElementById("btnNext");
    const btnRepeat      = document.getElementById("btnRepeat");

    let correctColor = null;
    let score = 0;

    // Fisher–Yates shuffle
    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function speakQuestion() {
      if (!correctColor) return;
      speak("Zhafran, yang mana kotak warna: " + correctColor.name);
    }

    function newQuestion() {
      message.textContent = "";
      message.style.color = "#475569";
      boxesContainer.innerHTML = "";

      const shuffled = shuffleArray([...colors]);
      const selected = shuffled.slice(0, 10);

      correctColor = selected[Math.floor(Math.random() * selected.length)];
      colorNameText.textContent = correctColor.name;

      selected.forEach(color => {
        const div = document.createElement("div");
        div.className = "box";
        div.style.backgroundColor = color.code;
        div.addEventListener("click", () => checkAnswer(color));
        boxesContainer.appendChild(div);
      });

      speakQuestion();
    }

    function checkAnswer(chosenColor) {
      if (!correctColor) return;

      if (chosenColor.name === correctColor.name) {
        const text = "Bagus sekali Zhafran! Jawaban benar, itu warna " + correctColor.name + ".";
        message.textContent = text;
        message.style.color = "#16a34a";
        score++;
        speak(text);
      } else {
        const text = "Ups, masih salah zhafran. Coba pilih warna yang lain Nya.";
        message.textContent = text;
        message.style.color = "#dc2626";
        speak(text);
      }
      scoreText.textContent = "Skor: " + score;
    }

    btnNext.addEventListener("click", newQuestion);
    btnRepeat.addEventListener("click", speakQuestion);

    newQuestion();
  </script>
</body>
</html>
