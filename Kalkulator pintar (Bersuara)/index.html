<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Kalkulator Pintar Anak</title>

<style>
*{box-sizing:border-box;}
body{
    margin:0;
    font-family:'Comic Sans MS';
    background:linear-gradient(to bottom,#ff9a9e,#fecfef);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.container{
    width:100%;
    max-width:420px;
    height:100vh;
    background:#fff;
    padding:15px;
    display:flex;
    flex-direction:column;
}
@media(min-width:600px){
    .container{
        height:auto;
        border-radius:25px;
        box-shadow:0 15px 35px rgba(0,0,0,.3);
    }
}
h1{
    text-align:center;
    color:#ff6b6b;
    margin:5px 0;
}
#display{
    width:100%;
    height:90px;
    font-size:2.2em;
    text-align:right;
    padding:15px;
    border-radius:15px;
    border:3px solid #4ecdc4;
}
#feedback,#score{
    text-align:center;
    margin:5px 0;
    font-size:1.1em;
}
.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:5px;
    flex-grow:1;
}
button{
    border:none;
    border-radius:18px;
    font-size:1.6em;
    font-weight:bold;
    cursor:pointer;
    min-height:40px;
}
button:active{transform:scale(.95);}
.num{background:#45b7d1;color:#fff;}
.op{background:#f7dc6f;}
.clear{background:#f1948a;color:#fff;}
.equals{
    background:#96ceb4;
    color:#fff;
    grid-row:span 2;
}
</style>
</head>

<body>
<div class="container">
<h1>Kalkulator Pintar</h1>
<p id="feedback">Sentuh angka & dengarkan</p>
<input id="display" value="0" readonly>
<br>
<div class="buttons">
<button class="clear" onclick="clearDisplay()">C</button>
<button class="clear" onclick="deleteLast()">⌫</button>
<button class="op" onclick="append('/')">÷</button>
<button class="op" onclick="append('*')">×</button>

<button class="num" onclick="append('7')">7</button>
<button class="num" onclick="append('8')">8</button>
<button class="num" onclick="append('9')">9</button>
<button class="op" onclick="append('-')">−</button>

<button class="num" onclick="append('4')">4</button>
<button class="num" onclick="append('5')">5</button>
<button class="num" onclick="append('6')">6</button>
<button class="op" onclick="append('+')">+</button>

<button class="num" onclick="append('1')">1</button>
<button class="num" onclick="append('2')">2</button>
<button class="num" onclick="append('3')">3</button>
<button class="equals" onclick="calculate()">=</button>

<button class="num" onclick="append('0')">0</button>
<button class="num" onclick="append('.')">.</button>
</div>
</div>

<script>
let score=0;

/* ===== TEXT TO SPEECH ===== */
function speak(text){
    if(!text) return;
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='id-ID';
    u.rate=.65;
    speechSynthesis.speak(u);
}

/* ===== ANGKA KE BAHASA INDONESIA (SUPPORT MINUS & PECAHAN) ===== */
function numberToIndo(num){
    if(num === '' || isNaN(num)) return '';

    let n = parseFloat(num);

    if(n < 0){
        return 'minus ' + numberToIndo(Math.abs(n));
    }

    const s=['nol','satu','dua','tiga','empat','lima','enam','tujuh','delapan','sembilan'];
    const b=['sepuluh','sebelas','dua belas','tiga belas','empat belas','lima belas','enam belas','tujuh belas','delapan belas','sembilan belas'];
    const p=['','','dua puluh','tiga puluh','empat puluh','lima puluh','enam puluh','tujuh puluh','delapan puluh','sembilan puluh'];
    const k=['','ribu','juta','miliar','triliun'];

    let [intPart, fracPart] = n.toString().split('.');

    let angka = parseInt(intPart);
    let hasil = '';

    if(angka === 0) hasil = 'nol';

    let i=0;
    while(angka > 0){
        let c = angka % 1000;
        if(c){
            let t='';
            if(c >= 100){
                t += (Math.floor(c/100)==1?'seratus':s[Math.floor(c/100)]+' ratus');
                c %= 100; if(c) t+=' ';
            }
            if(c >= 20){
                t += p[Math.floor(c/10)];
                if(c%10) t+=' '+s[c%10];
            }else if(c >= 10){
                t += b[c-10];
            }else if(c > 0){
                t += s[c];
            }
            hasil = t + (k[i]?' '+k[i]:'') + (hasil?' '+hasil:'');
        }
        angka = Math.floor(angka/1000);
        i++;
    }

    if(fracPart){
        hasil += ' koma ';
        hasil += fracPart.split('').map(d=>s[d]).join(' ');
    }

    return hasil.trim();
}

/* ===== BACA EKSPRESI ===== */
function speakExpression(expr){
    const map={
        '+':' tambah ',
        '-':' kurang ',
        '*':' kali ',
        '/':' bagi '
    };

    let text='',buffer='';
    for(let c of expr){
        if(/[0-9.]/.test(c)){
            buffer+=c;
        }else if(map[c]){
            if(buffer){
                text+=numberToIndo(buffer)+' ';
                buffer='';
            }
            text+=map[c];
        }
    }
    if(buffer) text+=numberToIndo(buffer);
    return text.trim();
}

/* ===== INPUT ===== */
function append(v){
    if(display.value==='0'||display.value==='Error') display.value=v;
    else display.value+=v;
    speak(speakExpression(display.value));
}

function clearDisplay(){
    display.value='0';
    feedback.textContent='Layar dibersihkan';
    speak('nol');
}

function deleteLast(){
    display.value=display.value.length>1?display.value.slice(0,-1):'0';
    speak(speakExpression(display.value));
}

function calculate(){
    try{
        if(!/^[0-9+\-*/.]+$/.test(display.value)) throw 1;

        const ekspresiText = speakExpression(display.value);
        const hasil = eval(display.value);

        if(Math.abs(hasil) > 999999999) throw 1;

        display.value = hasil;
        
        
        feedback.textContent = '✅ Benar!';

        speak(ekspresiText + ' sama dengan ' + numberToIndo(hasil));
    }catch{
        display.value='Error';
        feedback.textContent='❌ Salah!';
        speak('coba lagi');
    }
}
</script>
</body>
</html>
