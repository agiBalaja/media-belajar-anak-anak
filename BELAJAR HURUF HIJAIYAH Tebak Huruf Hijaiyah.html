<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Tebak Huruf Hijaiyah | Belajar Mengaji</title>
  <style>
    :root {
      --bg: #e0f2fe;
      --card-bg: #ffffff;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --accent: #f97316;
      --success: #16a34a;
      --danger: #dc2626;
      --text-main: #0f172a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #bfdbfe, var(--bg));
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .game-wrapper {
      width: 100%;
      max-width: 900px;
    }

    .game-card {
      background: var(--card-bg);
      border-radius: 18px;
      box-shadow: 0 15px 30px rgba(15, 23, 42, 0.18);
      padding: 18px 16px 20px;
      border: 1px solid rgba(148, 163, 184, 0.4);
    }

    @media (min-width: 600px) {
      .game-card {
        padding: 24px 24px 26px;
      }
    }

    .game-header {
      text-align: center;
      margin-bottom: 14px;
    }

    .title-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(37, 99, 235, 0.08);
      color: var(--primary);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .title-chip span {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.25);
    }

    h1 {
      font-size: 20px;
      margin-bottom: 4px;
      color: var(--primary-dark);
    }

    @media (min-width: 600px) {
      h1 {
        font-size: 24px;
      }
    }

    .subtitle {
      font-size: 13px;
      color: #64748b;
    }

    #question {
      font-size: 15px;
      margin: 14px 0 10px;
      text-align: center;
    }

    #targetLetter {
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      font-size: 28px;
      font-family: 'Amiri', 'Traditional Arabic', 'Scheherazade New', 'Noto Naskh Arabic', system-ui, serif;
      letter-spacing: 2px;
    }

    .info-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 13px;
      color: #475569;
    }

    .info-pill {
      padding: 4px 10px;
      border-radius: 999px;
      background: #eff6ff;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .info-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #22c55e;
    }

    #boxes {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .box {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      cursor: pointer;
      border: 2px solid #e5e7eb;
      background: linear-gradient(135deg, #eff6ff, #dbeafe);
      box-shadow: 0 6px 12px rgba(15, 23, 42, 0.18);
      transition: transform 0.1s, box-shadow 0.1s, border-color 0.1s, background 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: 600;
      color: #1f2937;
      font-family: 'Amiri', 'Traditional Arabic', 'Scheherazade New', 'Noto Naskh Arabic', system-ui, serif;
    }

    @media (min-width: 480px) {
      .box {
        width: 70px;
        height: 70px;
        font-size: 34px;
      }
    }

    @media (min-width: 768px) {
      .box {
        width: 76px;
        height: 76px;
        font-size: 38px;
      }
    }

    .box:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 10px 18px rgba(15, 23, 42, 0.25);
      border-color: rgba(37, 99, 235, 0.7);
      background: linear-gradient(135deg, #dbeafe, #bfdbfe);
    }

    #message {
      font-size: 14px;
      min-height: 22px;
      margin-bottom: 6px;
      text-align: center;
      font-weight: 500;
    }

    #score {
      font-size: 14px;
      margin-bottom: 10px;
      text-align: center;
      color: #0f766e;
      font-weight: 600;
    }

    .button-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 4px;
    }

    button {
      padding: 8px 14px;
      font-size: 14px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 0.03em;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.1s, box-shadow 0.1s, background 0.1s;
      min-width: 140px;
    }

    #btnRepeat {
      background: #e0f2fe;
      color: var(--primary-dark);
      box-shadow: 0 6px 12px rgba(148, 163, 184, 0.5);
    }

    #btnNext {
      background: var(--primary);
      color: #ffffff;
      box-shadow: 0 6px 14px rgba(37, 99, 235, 0.55);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 16px rgba(15, 23, 42, 0.25);
    }

    #btnNext:hover {
      background: var(--primary-dark);
    }

    .btn-icon {
      font-size: 15px;
    }

    .footer-note {
      margin-top: 8px;
      font-size: 11px;
      text-align: center;
      color: #9ca3af;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 18px;
      }
      #question {
        font-size: 14px;
      }
      button {
        font-size: 13px;
        padding: 7px 12px;
      }
    }
    /* Tambahan gaya untuk mendukung tampilan huruf Arab */
    .arabic-font {
      font-family: 'Amiri', 'Traditional Arabic', 'Scheherazade New', 'Noto Naskh Arabic', serif;
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="game-card">
      <div class="game-header">
        <div class="title-chip">
          <span></span>
          BELAJAR HURUF HIJAIYAH
        </div>
        <h1>Tebak Huruf Hijaiyah</h1>
        <p class="subtitle">Dengar suaranya, pilih huruf yang benar!</p>
      </div>

      <p id="question">
        Klik huruf: <span id="targetLetter">ا</span>
      </p>

      <div class="info-row">
        <div class="info-pill">
          <div class="info-dot"></div>
          Mengenal Alif Ba Ta
        </div>
        <div class="info-pill">
          🎧 Audio panduan
        </div>
      </div>

      <div id="boxes">
        <!-- huruf hijaiyah akan dibuat dengan JavaScript -->
      </div>

      <div id="message"></div>
      <div id="score">Skor: 0</div>

      <div class="button-row">
        <button id="btnRepeat">
          <span class="btn-icon">🔊</span> Ulangi Suara
        </button>
        <button id="btnNext">
          <span class="btn-icon">➡️</span> Soal Berikutnya
        </button>
      </div>

      <div class="footer-note">
        Tip: Cocok untuk anak belajar mengenal huruf hijaiyah dari Alif sampai Ya.
      </div>
    </div>
  </div>

  <script>
    // Daftar Huruf Hijaiyah lengkap beserta bacaan/lafalnya untuk suara (menggunakan ejaan latin)
    // Urutan standar hijaiyah (28 huruf)
    const hijaiyahData = [
      { arab: "ا", latin: "Alif", voice: "Alif" },
      { arab: "ب", latin: "Ba", voice: "Ba" },
      { arab: "ت", latin: "Ta", voice: "Ta" },
      { arab: "ث", latin: "Tsa", voice: "Tsa" },
      { arab: "ج", latin: "Jim", voice: "Jim" },
      { arab: "ح", latin: "Ha", voice: "Ha" },
      { arab: "خ", latin: "Kha", voice: "Kha" },
      { arab: "د", latin: "Dal", voice: "Dal" },
      { arab: "ذ", latin: "Dzal", voice: "Dzal" },
      { arab: "ر", latin: "Ra", voice: "Ra" },
      { arab: "ز", latin: "Zay", voice: "Zay" },
      { arab: "س", latin: "Sin", voice: "Sin" },
      { arab: "ش", latin: "Syin", voice: "Syin" },
      { arab: "ص", latin: "Shad", voice: "Shad" },
      { arab: "ض", latin: "Dhad", voice: "Dhad" },
      { arab: "ط", latin: "Tha", voice: "Tha" },
      { arab: "ظ", latin: "Zha", voice: "Zha" },
      { arab: "ع", latin: "Ain", voice: "Ain" },
      { arab: "غ", latin: "Ghain", voice: "Ghain" },
      { arab: "ف", latin: "Fa", voice: "Fa" },
      { arab: "ق", latin: "Qaf", voice: "Qaf" },
      { arab: "ك", latin: "Kaf", voice: "Kaf" },
      { arab: "ل", latin: "Lam", voice: "Lam" },
      { arab: "م", latin: "Mim", voice: "Mim" },
      { arab: "ن", latin: "Nun", voice: "Nun" },
      { arab: "و", latin: "Waw", voice: "Waw" },
      { arab: "ه", latin: "Ha", voice: "Ha" },
      { arab: "ي", latin: "Ya", voice: "Ya" }
    ];

    // Ambil array huruf Arab & informasi bacaan
    const arabicLetters = hijaiyahData.map(item => item.arab);
    const fullHijaiyahList = [...hijaiyahData]; 

    const synth = window.speechSynthesis;
    
    // Fungsi untuk membacakan huruf hijaiyah dengan lafal yang sesuai (menggunakan nama huruf)
    function speakHijaiyah(arabChar) {
      if (!synth) return;
      // cari data berdasarkan huruf arab
      const found = fullHijaiyahList.find(item => item.arab === arabChar);
      let textToSpeak = "Huruf ";
      if (found) {
        textToSpeak += found.latin; // misal "Ba", "Jim", dll.
      } else {
        textToSpeak += arabChar;
      }
      const utter = new SpeechSynthesisUtterance(textToSpeak);
      utter.lang = "id-ID";
      // sedikit memperlambat agar lebih jelas untuk anak
      utter.rate = 0.9;
      synth.cancel();
      synth.speak(utter);
    }

    // Fungsi untuk mengucapkan pertanyaan: "Tebak huruf: ..."
    function speakQuestionLetter(arabChar) {
      if (!synth) return;
      const found = fullHijaiyahList.find(item => item.arab === arabChar);
      let letterName = arabChar;
      if (found) {
        letterName = found.latin;
      }
      const fullText = `Tebak huruf: ${letterName}`;
      const utter = new SpeechSynthesisUtterance(fullText);
      utter.lang = "id-ID";
      utter.rate = 0.9;
      synth.cancel();
      synth.speak(utter);
    }

    // Fungsi untuk memainkan feedback (benar/salah)
    function speakFeedback(isCorrect, correctChar) {
      if (!synth) return;
      let msg = "";
      if (isCorrect) {
        const foundCorrect = fullHijaiyahList.find(item => item.arab === correctChar);
        const nameCorrect = foundCorrect ? foundCorrect.latin : correctChar;
        msg = `Hebat Fahira! Jawaban benar, itu huruf ${nameCorrect}.`;
      } else {
        msg = "Masih salah Tino. Coba pilih huruf yang lain nya.";
      }
      const utter = new SpeechSynthesisUtterance(msg);
      utter.lang = "id-ID";
      utter.rate = 0.9;
      synth.cancel();
      synth.speak(utter);
    }

    const boxesContainer = document.getElementById("boxes");
    const targetLetterSpan = document.getElementById("targetLetter");
    const messageDiv = document.getElementById("message");
    const scoreSpan = document.getElementById("score");
    const btnNextEl = document.getElementById("btnNext");
    const btnRepeatEl = document.getElementById("btnRepeat");

    let currentCorrectLetter = null;   // huruf arab yang benar
    let currentScore = 0;

    // Fungsi shuffle (Fisher-Yates)
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // Membuat soal baru: ambil 10 huruf hijaiyah acak dari 28 huruf, lalu pilih salah satu sebagai target
    function generateNewQuestion() {
      messageDiv.textContent = "";
      messageDiv.style.color = "#475569";
      boxesContainer.innerHTML = "";

      // 1. Ambil semua huruf arab dari daftar
      const allArabic = [...arabicLetters];
      // 2. Acak seluruh huruf
      const shuffledAll = shuffleArray([...allArabic]);
      // 3. Ambil 10 huruf berbeda untuk pilihan
      const selectedLetters = shuffledAll.slice(0, 10);
      
      // 4. Pilih satu huruf secara acak dari 10 pilihan sebagai jawaban benar
      const randomIndex = Math.floor(Math.random() * selectedLetters.length);
      currentCorrectLetter = selectedLetters[randomIndex];
      
      // Tampilkan target di UI (huruf arab)
      targetLetterSpan.textContent = currentCorrectLetter;
      
      // 5. Buat kotak pilihan (10 huruf)
      selectedLetters.forEach(letter => {
        const box = document.createElement("div");
        box.className = "box";
        box.textContent = letter;
        // event listener untuk jawaban
        box.addEventListener("click", () => handleAnswer(letter));
        boxesContainer.appendChild(box);
      });
      
      // Setelah generate, suarakan pertanyaan "Tebak huruf: ..."
      speakQuestionLetter(currentCorrectLetter);
    }
    
    // Menangani jawaban user
    function handleAnswer(selectedArab) {
      if (!currentCorrectLetter) return;
      
      if (selectedArab === currentCorrectLetter) {
        // Jawaban benar
        messageDiv.textContent = `Hebat Fahira! Jawaban benar, itu huruf ${getLetterName(currentCorrectLetter)}.`;
        messageDiv.style.color = "#16a34a";
        currentScore++;
        // Feedback suara (benar)
        speakFeedback(true, currentCorrectLetter);
      } else {
        // Jawaban salah
        messageDiv.textContent = "Masih salah tino. Coba pilih huruf yang lain nya.";
        messageDiv.style.color = "#dc2626";
        speakFeedback(false, currentCorrectLetter);
      }
      // Update skor
      scoreSpan.textContent = `Skor: ${currentScore}`;
    }
    
    // Helper untuk mendapatkan nama huruf (latin) dari huruf arab
    function getLetterName(arabChar) {
      const found = fullHijaiyahList.find(item => item.arab === arabChar);
      return found ? found.latin : arabChar;
    }
    
    // Tombol ulangi suara (mengulang pertanyaan berdasarkan currentCorrectLetter)
    function repeatVoice() {
      if (currentCorrectLetter) {
        speakQuestionLetter(currentCorrectLetter);
      } else {
        // Jika belum ada soal, generate ulang (tapi seharusnya selalu ada)
        generateNewQuestion();
      }
    }
    
    // Tombol soal berikutnya
    function nextQuestion() {
      generateNewQuestion();
    }
    
    // Event listeners
    btnNextEl.addEventListener("click", () => nextQuestion());
    btnRepeatEl.addEventListener("click", () => repeatVoice());
    
    // Mulai permainan dengan soal pertama
    generateNewQuestion();
    
    // Opsional: tambahkan dukungan untuk menonaktifkan speech saat banyak event (tidak masalah)
    // Pastikan juga tidak ada konflik suara saat generate cepat.
  </script>
</body>
</html>
