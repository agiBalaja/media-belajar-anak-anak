<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotografer Profesional - [Muhammad El Zhafran]</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            background-color: #333;
            color: #fff;
            padding: 20px 0;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: 0 auto;
            padding: 20px;
        }
        .slideshow-container {
            position: relative;
            max-width: 100%;
            margin: auto;
        }
        .mySlides {
            display: none;
            text-align: center;
        }
        .mySlides img {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
        }
        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            padding: 16px;
            margin-top: -22px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            transition: 0.6s ease;
            border-radius: 0 3px 3px 0;
            user-select: none;
        }
        .next {
            right: 0;
            border-radius: 3px 0 0 3px;
        }
        .prev:hover, .next:hover {
            background-color: rgba(0, 0, 0, 0.8);
        }
        .text {
            color: #f2f2f2;
            font-size: 15px;
            padding: 8px 12px;
            position: absolute;
            bottom: 8px;
            width: 100%;
            text-align: center;
        }
        .dot {
            cursor: pointer;
            height: 15px;
            width: 15px;
            margin: 0 2px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            transition: background-color 0.6s ease;
        }
        .active, .dot:hover {
            background-color: #717171;
        }
        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 10px 0;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>

<header>
    <h1>Fotografer Profesional - [Muhammad El Zhafran]</h1>
    <p>Abadikan Momen Berharga Anda dengan Sentuhan Profesional</p>
</header>

<div class="container">
    <h2>Portfolio Saya</h2>
    <div class="slideshow-container">
        <div class="mySlides">
            <img src="https://drive.google.com/thumbnail?id=11-ENi88P9HEDlo-7afjkjx7sVAoCdfXu&sz=w800" alt="Foto 1">
            <div class="text">Caption Foto 1</div>
        </div>
        <div class="mySlides">
            <img src="https://drive.google.com/thumbnail?id=10htG2TS8Nd-Xhk44Ifmgcw8c7BrQ1u11&sz=w800" alt="Foto 2">
            <div class="text">Caption Foto 2</div>
        </div>
        <div class="mySlides">
            <img src="https://drive.google.com/thumbnail?id=10oTlowcyn9eLxe9xzj18RrH-Sx8D6_7L&sz=w800" alt="Foto 3">
            <div class="text">Caption Foto 3</div>
        </div>
                <div class="mySlides">
            <img src="https://drive.google.com/thumbnail?id=10htG2TS8Nd-Xhk44Ifmgcw8c7BrQ1u11&sz=w800" alt="Foto 2">
            <div class="text">Caption Foto 4</div>
        </div>
                <div class="mySlides">
            <img src="https://drive.google.com/thumbnail?id=10htG2TS8Nd-Xhk44Ifmgcw8c7BrQ1u11&sz=w800" alt="Foto 2">
            <div class="text">Caption Foto 5</div>
        </div>
                <div class="mySlides">
            <img src="https://drive.google.com/thumbnail?id=10htG2TS8Nd-Xhk44Ifmgcw8c7BrQ1u11&sz=w800" alt="Foto 2">
            <div class="text">Caption Foto 6</div>
        </div>
                <div class="mySlides">
            <img src="https://drive.google.com/thumbnail?id=10htG2TS8Nd-Xhk44Ifmgcw8c7BrQ1u11&sz=w800" alt="Foto 2">
            <div class="text">Caption Foto 7</div>
        </div>
                <div class="mySlides">
            <img src="https://drive.google.com/thumbnail?id=10htG2TS8Nd-Xhk44Ifmgcw8c7BrQ1u11&sz=w800" alt="Foto 2">
            <div class="text">Caption Foto 8</div>
        </div>
        
        <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
        <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </div>
    <br>
    <div style="text-align:center">
        <span class="dot" onclick="currentSlide(1)"></span>
        <span class="dot" onclick="currentSlide(2)"></span>
        <span class="dot" onclick="currentSlide(3)"></span>
        <span class="dot" onclick="currentSlide(4)"></span>
        <span class="dot" onclick="currentSlide(5)"></span>
        <span class="dot" onclick="currentSlide(6)"></span>
        <span class="dot" onclick="currentSlide(7)"></span>
        <span class="dot" onclick="currentSlide(8)"></span>
    </div>
</div>

<footer>
    <p>© 2023 [Zhafran] Photography. All rights reserved.</p>
</footer>

<script>
    let slideIndex = 1;
    showSlides(slideIndex);

    function plusSlides(n) {
        showSlides(slideIndex += n);
    }

    function currentSlide(n) {
        showSlides(slideIndex = n);
    }

    function showSlides(n) {
        let i;
        let slides = document.getElementsByClassName("mySlides");
        let dots = document.getElementsByClassName("dot");
        if (n > slides.length) {slideIndex = 1}
        if (n < 1) {slideIndex = slides.length}
        for (i = 0; i < slides.length; i++) {
            slides[i].style.display = "none";
        }
        for (i = 0; i < dots.length; i++) {
            dots[i].className = dots[i].className.replace(" active", "");
        }
        slides[slideIndex-1].style.display = "block";
        dots[slideIndex-1].className += " active";
    }
</script>

</body>
</html>
